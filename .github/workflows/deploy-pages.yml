name: Deploy GitHub Pages

on:
  workflow_dispatch:
  # Future production mode:
  # push:
  #   branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify repository quality
        run: pnpm verify

      - name: Build Pages artifact
        run: pnpm build:pages
        env:
          VITE_SITE_BASE: /

      - name: Ensure GitHub Pages uses Actions
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          endpoint="https://api.github.com/repos/${GITHUB_REPOSITORY}/pages"
          payload='{"build_type":"workflow"}'
          headers=(
            --header "Accept: application/vnd.github+json"
            --header "Authorization: Bearer ${GITHUB_TOKEN}"
            --header "X-GitHub-Api-Version: 2022-11-28"
          )

          status="$(curl --silent --show-error --output response.json --write-out '%{http_code}' --request PUT "${endpoint}" "${headers[@]}" --data "${payload}")"

          if [ "${status}" = "404" ]; then
            status="$(curl --silent --show-error --output response.json --write-out '%{http_code}' --request POST "${endpoint}" "${headers[@]}" --data "${payload}")"
          fi

          if [ "${status}" != "200" ] && [ "${status}" != "201" ] && [ "${status}" != "204" ]; then
            cat response.json
            exit 1
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./.pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
